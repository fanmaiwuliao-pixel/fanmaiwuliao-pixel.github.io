# Pages CMS 配置文件 —— 放在仓库根目录
media:
  input: files
  output: /files

content:
  - name: posts
    label: 文章 / 日记
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{fields.slug}.md"
    view:
      fields: [title, date]
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: date
        label: 日期
        type: date
        required: true
      - name: slug
        label: 网址用短名（英文或拼音，如 dushu-biji）
        type: string
        required: true
      - name: categories
        label: 分类
        type: select
        options:
          values: [日记, 论文, 随笔]
        list: true
      - name: body
        label: 正文
        type: rich-text

  - name: index
    label: 首页（引得）
    type: file
    path: index.md
    fields:
      - name: layout
        type: string
        hidden: true
        default: default
      - name: title
        label: 页面标题
        type: string
        default: 引得
      - name: body
        label: 正文
        type: rich-text

  - name: cv
    label: 学术简历
    type: file
    path: cv.md
    fields:
      - name: layout
        type: string
        hidden: true
        default: default
      - name: title
        label: 页面标题
        type: string
        default: 学术简历
      - name: permalink
        type: string
        hidden: true
        default: /cv/
      - name: body
        label: 正文
        type: rich-text

  - name: config
    label: 网站设置
    type: file
    path: _config.yml
    fields:
      - name: title
        label: 网站名称
        type: string
      - name: subtitle
        label: 副标题
        type: string
      - name: author
        label: 作者
        type: string
      - name: email
        label: Email
        type: string
      - name: description
        label: 网站描述
        type: string
      - name: baseurl
        type: string
        hidden: true
      - name: url
        type: string
        hidden: true
      - name: markdown
        type: string
        hidden: true
      - name: permalink
        type: string
        hidden: true
