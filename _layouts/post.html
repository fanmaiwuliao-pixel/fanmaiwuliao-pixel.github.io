---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">
    {{ page.date | date: "%Y 年 %-m 月 %-d 日" }}
    {% if page.categories.size > 0 %} · 分类：{{ page.categories | join: "、" }}{% endif %}
  </p>
  {{ content }}
  <p class="back-link"><a href="{{ '/blog/' | relative_url }}">← 返回所有文章</a></p>
</article>
